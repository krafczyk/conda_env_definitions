name: big_env
channels:
  - conda-forge
  - pytorch
  - nvidia
dependencies:
  - python=3.12
  - ipykernel
  - pytorch-gpu=*=cuda126*
  - torchvision=*=cuda126*
  - torchaudio=*=cuda126*
  - accelerate
  - transformers
  - huggingface_hub
  - tokenizers
  - xonsh=0.22
  - ray-all
  - spacy
  - numpy
  - numba
  - pandas
  - pandas-stubs
  - xarray
  - cuda-nvcc
  - datasets>=4.0
  - sympy
  - scipy
  - scipy-stubs
  - statsmodels
  - scikit-learn
  - matplotlib
  - seaborn
  - plotly
  - bokeh
  - panel
  - hvsampledata
  - datashader
  - holoviews
  - hvplot
  - pyviz_comms
  - zstandard
  - pybind11
  - yt
  - pip
  - pip:
    - "jax[cuda12]"
    - "tensorflow[and-cuda]>=2.18"
    - tensorflow-datasets
    - cppimport
